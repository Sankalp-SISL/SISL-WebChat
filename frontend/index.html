<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SISL Connect Bot – Intelligent Support Assistant</title>
  <style>
    :root {
      --navy:      #0a2463;
      --navy-dark: #071a47;
      --blue:      #0066cc;
      --blue-dark: #004fa3;
      --red:       #c41e3a;
      --red-dark:  #a01830;
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --border:    #dde3ea;
      --text:      #1a202c;
      --text-muted:#6b7280;
      --bot-bg:    #eef2f7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      height: 100dvh;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Outer shell ── */
    .chat-shell {
      width: 100%;
      max-width: 860px;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: 0 0 40px rgba(10,36,99,.12);
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 100%);
      color: #fff;
      padding: 0 20px;
      height: 72px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 3px solid var(--red);
      position: relative;
      overflow: hidden;
    }

    /* subtle diagonal stripe accent */
    .chat-header::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 160px;
      height: 160px;
      background: rgba(255,255,255,.04);
      border-radius: 50%;
      pointer-events: none;
    }

    .header-logo {
      flex-shrink: 0;
      height: 40px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .header-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,.25);
      flex-shrink: 0;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      opacity: .75;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-badge {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
      color: rgba(255,255,255,.9);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,.3); }
      50%       { box-shadow: 0 0 0 5px rgba(34,197,94,.1); }
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg);
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    /* date chip */
    .date-chip {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin: 4px 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .date-chip::before,
    .date-chip::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn .25s ease-out both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { flex-direction: row-reverse; }
    .message.bot   { flex-direction: row; }

    /* avatar */
    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .message.bot  .msg-avatar { background: var(--navy); color: #fff; }
    .message.user .msg-avatar { background: var(--red);  color: #fff; }

    .msg-bubble {
      max-width: min(72%, 520px);
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
    }

    .message.bot .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border-radius: 4px 16px 16px 16px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--blue) 0%, var(--navy) 100%);
      color: #fff;
      border-radius: 16px 4px 16px 16px;
      box-shadow: 0 2px 8px rgba(0,102,204,.25);
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 13px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue);
      animation: bounce 1.3s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0);    opacity: .4; }
      30%            { transform: translateY(-7px); opacity: 1;  }
    }

    /* ── Input area ── */
    .chat-footer {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px 14px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 28px;
      padding: 6px 6px 6px 18px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-row:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,102,204,.1);
    }

    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 16px; /* 16px prevents iOS zoom */
      font-family: inherit;
      color: var(--text);
      outline: none;
      min-width: 0;
      padding: 4px 0;
    }

    .input-row input::placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    .send-btn {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--blue) 0%, var(--navy) 100%);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s, box-shadow .2s, opacity .2s;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 14px rgba(0,102,204,.35);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(.96);
    }

    .send-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .footer-note {
      text-align: center;
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: .2px;
    }

    /* ── Scrollbar ── */
    .chat-messages::-webkit-scrollbar       { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #c5ccd6; border-radius: 4px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .chat-header {
        height: 62px;
        padding: 0 14px;
        gap: 10px;
      }

      .header-logo  { height: 32px; }
      .header-text h1 { font-size: 15px; }
      .header-text p  { font-size: 10px; }
      .header-badge   { display: none; }
      .header-divider { display: none; }

      .chat-messages { padding: 14px 12px; }

      .msg-bubble {
        max-width: 82%;
        font-size: 13.5px;
        padding: 10px 13px;
      }

      .msg-avatar { width: 26px; height: 26px; font-size: 11px; }

      .chat-footer { padding: 10px 12px 12px; }
      .input-row   { padding: 5px 5px 5px 15px; }
      .send-btn    { width: 38px; height: 38px; }
    }

    @media (max-width: 360px) {
      .chat-header  { height: 56px; padding: 0 12px; gap: 8px; }
      .header-logo  { height: 28px; }
      .header-text h1 { font-size: 13px; }
      .header-text p  { display: none; }
      .msg-bubble   { max-width: 88%; }
    }
  </style>
</head>

<body>
  <div class="chat-shell">

    <!-- Header -->
    <header class="chat-header">
      <img src="logo.bmp" alt="SISL Infotech" class="header-logo" />
      <div class="header-divider"></div>
      <div class="header-text">
        <h1>SISL Connect Bot</h1>
        <p>Intelligent Enterprise Assistant</p>
      </div>
      <div class="header-badge">
        <span class="status-dot"></span>
        Online
      </div>
    </header>

    <!-- Messages -->
    <main class="chat-messages" id="chat-messages" role="log" aria-live="polite">
      <div class="date-chip">Today</div>
      <div class="message bot">
        <div class="msg-avatar" aria-hidden="true">SI</div>
        <div class="msg-bubble">
          Welcome to <strong>SISL Connect Bot</strong>. I can help you with information about SISL Infotech's services, solutions, partnerships, and more.<br><br>How can I assist you today?
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="chat-footer">
      <div class="input-row">
        <input
          type="text"
          id="user-input"
          placeholder="Ask about our services, solutions..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Message input"
        />
        <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="footer-note">Powered by SISL Infotech &nbsp;·&nbsp; Responses are based on official content</p>
    </footer>
  </div>

  <script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage(text, 'user');
      inputEl.value = '';
      sendBtn.disabled = true;

      const typingId = showTyping();

      try {
        const res = await fetch(
          'https://chatbot-backend-120807823040.us-central1.run.app/chat',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: text })
          }
        );

        removeTyping(typingId);

        if (!res.ok) throw new Error('Server error');

        const data = await res.json();
        appendMessage(data.answer || 'I could not find an answer. Please try rephrasing.', 'bot');
      } catch {
        removeTyping(typingId);
        appendMessage('I\'m unable to reach the server right now. Please check your connection and try again.', 'bot');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function appendMessage(text, role) {
      const wrap = document.createElement('div');
      wrap.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.setAttribute('aria-hidden', 'true');
      avatar.textContent = role === 'bot' ? 'SI' : 'You';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const id = 'typing-' + Date.now();
      const wrap = document.createElement('div');
      wrap.className = 'message bot';
      wrap.id = id;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.setAttribute('aria-hidden', 'true');
      avatar.textContent = 'SI';

      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener('load', () => inputEl.focus());
  </script>
</body>
</html>
